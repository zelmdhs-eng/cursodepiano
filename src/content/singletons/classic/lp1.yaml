  Eu sempre vi pessoas dizendo: "Ah, eu sou velho demais para aprender um instrumento", ou "Meus dedos são travados e eu não levo jeito".
  
  O que a ciência nos mostra e a prática comprova é que tocar piano, depois de adulto, é um dos maiores "remédios" contra a ansiedade, estresse e envelhecimento precoce.
  
  Muitos alunos meus aprenderam online, no próprio tempo, muito mais do que aprenderiam suportando 2 anos de aulas presenciais arrastadas.
  
  Você não precisa ser um prodígio ou uma criança prodígio. Você só precisa da sequência certa de passos. E foi isso que eu estruturei neste curso.
