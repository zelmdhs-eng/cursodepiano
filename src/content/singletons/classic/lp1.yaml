# 10. FAQ
faqTitle: "Perguntas Frequentes"
faqItems:
  - question: "Preciso ter um piano de cauda ou serve um teclado simples?"
    answer: >-
      Você pode começar com um teclado arranjador ou sensitivo perfeitamente! Não precisa investir num piano caro agora. 
      Nossas técnicas servem tanto para quem tem um tecladinho simples em casa quanto para quem já tem um piano digital ou acústico.
  - question: "Sou adulto/idoso, meus dedos não são tão rápidos. É para mim?"
    answer: >-
      Completamente. O ensino engessado tradicional cobra precisão técnica matemática. O nosso método ensina o piano como uma ferramenta de relaxamento mental 
      e qualidade de vida. Os exercícios soltam os dedos lentamente de forma orgânica.
  - question: "Quando poderei tocar minha primeira música?"
    answer: >-
      Nossos alunos, ao seguirem a metodologia passo-a-passo, conseguem tocar a primeira música com as duas mãos já na 4ª aula.
  - question: "Terei acesso por quanto tempo?"
    answer: >-
      O seu acesso é ilimitado! Você paga apenas uma vez e tem acesso contínuo às aulas e às futuras atualizações do curso.

