heroTitle: A Música está em Você
heroSubtitle: Nossa missão não é ensinar notas soltas, é destravar a linguagem dos acordes para que você toque as músicas que mais ama nas primeiras semanas.
missionTitle: Da Teoria Massante à Prática
missionDescription: A maioria das escolas de música faz o aluno passar anos travado na teoria antes de tocar a primeira música popular. Nossa jornada envolveu inverter esse processo — o Método Direto ao Ponto foi desenhado para quem tem pressa e quer ver resultado saindo do teclado imediatamente.
visionTitle: Nosso Manifesto Musical
visionDescription: Acreditamos que o talento não é um dom divino que nasce com poucos; ele é o resultado da paixão combinada com o método certo. Você não está velho demais e nem precisa de "mãos de pianista" para emocionar as pessoas ao seu redor.
valuesTitle: O Que é o Método Direto ao Ponto?
values:
  - icon: 🎹
    title: Acordes e Padrões
    description: Focamos no padrão das músicas populares, ignorando a leitura de partituras complexas no início.
  - icon: 🎼
    title: Repertório Personalizado
    description: O aluno é engajado porque aprende usando as músicas que ele próprio escolhe e ama ouvir.
  - icon: 🚀
    title: Resultado Rápido
    description: Com nosso cronograma, alunos iniciantes costumam tocar a primeira música já na quarta aula prática.
teamTitle: Quem está por trás
teamMembers:
  - name: Professor de Piano
    role: Criador do Método "Direto ao Ponto"
    bio: Após sofrer com métodos engessados por anos, decidi compilar apenas os atalhos e os padrões harmônicos que realmente importam no teclado. Hoje ajudo milhares de adultos que achavam que não tinham "o dom" a destravar nas teclas.
    photo: /images/author-fallback.jpg
ctaTitle: Vamos Tocar Sua Primeira Música?
ctaDescription: Se você quer entender de forma prática como as notas se conectam, convido você a embarcar na nossa primeira aula sem medo.
ctaButtonText: Quero Aprender Agora
