heroTitle: Você atrai o que você é
heroSubtitle: Essa frase não é apenas um lema para este blog é o fundamento de cada mudança que vivi e que agora ajudo você a trilhar.
missionTitle: Da Transição à Consciência
missionDescription: Minha caminhada envolveu uma quebra profunda de paradigmas. Vinda de uma vivência religiosa tradicional evangélica, precisei desaprender para verdadeiramente despertar. Ao mergulhar nos estudos da Física Quântica e da Metafísica, compreendi que a realidade que eu enxergava era apenas um reflexo da frequência que eu emitia.
visionTitle: Nosso Manifesto
visionDescription: Acreditamos que ninguém é vítima das circunstâncias. Somos todos arquitetos da nossa própria frequência vibracional. Mudar a sua vida não é um milagre externo; é uma escolha consciente de quem decide ser o soberano de sua própria existência.
valuesTitle: O Que é a Soberania Quântica?
values:
  - icon: ❇️
    title: Elevação Vibracional
    description: Elevar sua vibração através de pequenas e constantes ações baseadas na gratidão genuína.
  - icon: 🔬
    title: Base Científica
    description: Entender a ciência por trás da manifestação e de como seus sentimentos afetam sua realidade material física.
  - icon: 🛠️
    title: Prática Diária
    description: Utilizar ferramentas práticas e rotinas para assumir, de uma vez por todas, o comando da sua realidade.
teamTitle: Quem sou eu
teamMembers:
  - name: Paula Franco
    role: Mentora de Física Quântica e Metafísica
    bio: Por muito tempo vivi seguindo padrões que não me pertenciam, buscando respostas no mundo externo, enquanto o Universo esperava que eu olhasse para dentro. Hoje, ajudo milhares de mentes despertas a atingirem a maestria sobre a própria vida.
    photo: /paula-sobre.jpeg
ctaTitle: Vamos despertar juntos?
ctaDescription: Se você está cansada de se sentir frustrada e quer entender como mudar sua realidade de verdade, te convido a fazer parte da nossa comunidade.
ctaButtonText: Acompanhar no Instagram
